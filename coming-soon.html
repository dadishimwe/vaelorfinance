<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1" name="viewport" />
    <meta content="noindex, nofollow" name="robots" />
    <title>Vaelor Finance — Coming soon</title>
    <meta
      content="We are updating our site. Check back soon."
      name="description"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #2b0934;
        --accent: #cd9e5b;
        --muted: #b2823f;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 1.5rem;
        font-family:
          "Instrument Serif",
          Georgia,
          "Times New Roman",
          serif;
        background: var(--bg);
        color: #fff;
        text-align: center;
      }
      .wrap {
        max-width: 40rem;
      }
      h1 {
        margin: 0 0 1rem;
        font-size: clamp(1.75rem, 4vw, 2.5rem);
        font-weight: 400;
        letter-spacing: 0.02em;
        line-height: 1.2;
      }
      p {
        margin: 0;
        font-size: 1.1rem;
        line-height: 1.6;
        color: var(--muted);
      }
      .badge {
        display: inline-block;
        margin-bottom: 1.25rem;
        padding: 0.35rem 0.85rem;
        font-size: 0.75rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        color: var(--bg);
        background: var(--accent);
        border-radius: 999px;
      }
    .w-webflow-badge,.w-webflow-badge *{display:none !important;visibility:hidden !important}</style>
  </head>
  <body>
    <div class="wrap">
      <div class="badge">Coming soon</div>
      <h1>We’re preparing something new.</h1>
      <p>
        Vaelor Finance is under maintenance while we finish the site. Thank you
        for your patience—we’ll be live shortly.
      </p>
    </div>
  </body>
</html>
